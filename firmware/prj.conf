# LoRa
CONFIG_LORA=y
CONFIG_CRC=y

# Serial
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y
CONFIG_CONSOLE=y

CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="LoRa Start"
CONFIG_USB_DEVICE_MANUFACTURER="CMU"
CONFIG_USB_DEVICE_PID=0x0004
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n

CONFIG_LOG=y
CONFIG_LORA_LOG_LEVEL_INF=y
