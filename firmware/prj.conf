# LoRa
CONFIG_LORA=y
CONFIG_CRC=y

# Serial
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_CONSOLE=y
CONFIG_RING_BUFFER=y

CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_CDC_ACM_SERIAL_PID=0x0004
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="LoRa Start"
CONFIG_CDC_ACM_SERIAL_MANUFACTURER_STRING="CMU"

CONFIG_LOG=y
CONFIG_LORA_LOG_LEVEL_INF=y
